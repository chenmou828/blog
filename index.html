<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎访问</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* 时间 */
.time-box{
    position:fixed;
    top:15px;
    right:20px;
    background:#1e293b;
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
    color:#93c5fd;
}

/* 主区域 */
.hero{
    padding:100px 20px 60px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:20px;
}

h1{
    margin-top:20px;
}

.desc{
    color:#94a3b8;
    margin:20px auto;
    max-width:600px;
}

/* 按钮 */
.btn{
    display:inline-block;
    margin:10px;
    padding:14px 30px;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.btn:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

/* TG */
.tg-box{
    margin-top:20px;
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    color:#93c5fd;
    cursor:pointer;
    transition:0.2s;
}

.tg-box:hover{
    background:#334155;
}

/* 卡片 */
.card{
    background:#1e293b;
    margin:20px;
    padding:20px;
    border-radius:15px;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}
</style>
</head>

<body>

<!-- 时间 -->
<div class="time-box" id="timeBox">--:--:--</div>

<div class="hero">
    <img src="logo.png" class="logo">
    <h1>网站名称</h1>
    <p class="desc">
        欢迎来到本站，这里是你的引导页面
    </p>

    <!-- 按钮（已修正跳转） -->
    <div class="btn" onclick="goDemo()">手机号轰炸</div>
    <div class="btn" onclick="goMain()">邮箱轰炸</div>

    <!-- TG频道 -->
    <div class="tg-box" onclick="openTG()">
        📢 官方频道：@chenmou114514（点击进入）
    </div>
</div>

<div class="card">
    <h2>公告</h2>
    <p>本站持续更新中，请收藏！</p>
</div>

<div class="card">
    <h2>功能介绍</h2>
    <p>支持手机 / 电脑访问 · 简洁快速</p>
</div>

<script>

/* =========================
   ✅ 跳转按钮（已整理清楚）
========================= */

// demo站
function goDemo(){
    window.open(
        "https://chenmou828.github.io/demo-site/",
        "_blank",
        "noopener,noreferrer"
    );
}

// 主站
function goMain(){
    window.open(
        "https://chenmou828.github.io/",
        "_blank",
        "noopener,noreferrer"
    );
}


/* =========================
   ✅ Telegram频道跳转
========================= */

function openTG(){

    const tgWeb = "https://t.me/chenmou114514";

    // 先尝试打开App（第三方TG也支持）
    window.location.href = "tg://resolve?domain=chenmou114514";

    // 备用：网页打开
    setTimeout(()=>{
        window.open(tgWeb, "_blank", "noopener,noreferrer");
    }, 500);
}


/* =========================
   ✅ 实时时间
========================= */

function updateTime(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("timeBox").innerText = `${h}:${m}:${s}`;
}

setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
